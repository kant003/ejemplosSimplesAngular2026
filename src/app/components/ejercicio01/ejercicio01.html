<!--
Crea un componente (ejercicio01) Angular que dada una lista de numeros(array) (en logica de negocio)
Muestra (en el template) solamente los numeros impares
Y las superiores a 100 los mostrarás de color rojo
-->
@for(numero of numeros; track numero){
    @if(! isEven(numero)){
        <p [ngClass]="{'text-red-500':numero > 100}" 
           [class.text-red]="numero > 100">{{numero}}</p>
    }
}@empty{
    <p>No hay numeros que mostrar</p>
}
